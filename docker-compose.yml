version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: skadik-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: skadik
      POSTGRES_PASSWORD: skadik
      POSTGRES_DB: skadik
    command: postgres -c password_encryption=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skadik"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skadik-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skadik-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data: